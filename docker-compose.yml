version: '3.8'

services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "3005:80"
    env_file:
      - client/.env.docker
    networks:
      - essay-platform-network

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "5001:5000"
    depends_on:
      - db
    env_file:
      - server/.env.docker
    networks:
      - essay-platform-network

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: essay-platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ./server/src/config/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./server/src/config/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - essay-platform-network

networks:
  essay-platform-network:
    driver: bridge

volumes:
  postgres_data:
